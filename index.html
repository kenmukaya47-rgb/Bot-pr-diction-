<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bot Futuriste Trading</title>
  <style>
    body { font-family: Arial; background: #0a0a0a; color: #fff; text-align: center; padding: 40px; }
    h2 { color: #00ffe0; text-shadow: 0 0 10px #00ffe0; }
    .bloc { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 400px; margin: auto; box-shadow: 0 0 20px #00ffe0; }

    /* Gros bouton rond futuriste */
    .btn-analyser {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: conic-gradient(red, yellow, lime, cyan, magenta, red);
      border: none;
      cursor: pointer;
      animation: spin 4s linear infinite;
      font-weight: bold;
      color: #111;
      font-size: 20px;
      box-shadow: 0 0 30px #00ffe0;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    select {
      padding: 10px; border-radius: 8px; border: none; margin: 10px;
      background: #222; color: #fff;
    }

    #analyse { margin-top: 20px; text-align: left; font-size: 14px; background:#111; padding:10px; border-radius:8px; box-shadow: 0 0 15px #00ffe0; }
    #resultat { font-size: 28px; margin-top: 20px; font-weight: bold; text-shadow: 0 0 15px #fff; }
  </style>
</head>
<body>
  <h2>🚀 Bot Futuriste - Analyse Express</h2>
  
  <div class="bloc">
    <label>Choisir Actif :</label><br>
    <select id="asset">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="EURUSDT">EUR/USD</option>
      <option value="XAUUSDT">Or (XAU/USD)</option>
    </select><br>
    
    <label>Durée :</label><br>
    <select id="duration">
      <option value="5">5 secondes</option>
      <option value="10">10 secondes</option>
      <option value="30">30 secondes</option>
      <option value="60">1 minute</option>
    </select><br><br>
    
    <button class="btn-analyser" onclick="analyser()">GO</button>
    <div id="analyse">En attente d'analyse...</div>
    <div id="resultat"></div>
  </div>

  <script>
    // RSI
    function calculRSI(prices, period = 5) {
      let gains = 0, losses = 0;
      for (let i = 1; i < period; i++) {
        let diff = prices[i] - prices[i-1];
        if (diff >= 0) gains += diff; else losses -= diff;
      }
      let avgGain = gains / period;
      let avgLoss = losses / period;
      let rs = avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }
    // EMA
    function calculEMA(prices, period = 5) {
      let k = 2 / (period + 1);
      let ema = prices[0];
      for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
      }
      return ema;
    }
    // Stochastic
    function calculStoch(prices, period = 5) {
      let slice = prices.slice(-period);
      let high = Math.max(...slice);
      let low = Math.min(...slice);
      let current = prices[prices.length-1];
      return ((current - low) / (high - low)) * 100;
    }
    // Bollinger
    function calculBollinger(prices, period = 5, mult = 2) {
      let slice = prices.slice(-period);
      let mean = slice.reduce((a,b) => a+b, 0) / period;
      let variance = slice.reduce((a,b) => a + Math.pow(b-mean,2), 0) / period;
      let stdDev = Math.sqrt(variance);
      return { upper: mean + mult*stdDev, lower: mean - mult*stdDev };
    }
    // MACD
    function calculMACD(prices, shortPeriod = 12, longPeriod = 26, signalPeriod = 9) {
      let emaShort = calculEMA(prices, shortPeriod);
      let emaLong = calculEMA(prices, longPeriod);
      let macd = emaShort - emaLong;
      let signal = calculEMA([macd], signalPeriod);
      return { macd, signal };
    }
    // ATR
    function calculATR(data, period = 14) {
      let trs = [];
      for (let i = 1; i < data.length; i++) {
        let high = parseFloat(data[i][2]);
        let low = parseFloat(data[i][3]);
        let closePrev = parseFloat(data[i-1][4]);
        let tr = Math.max(high-low, Math.abs(high-closePrev), Math.abs(low-closePrev));
        trs.push(tr);
      }
      return trs.slice(-period).reduce((a,b)=>a+b,0)/period;
    }

    async function analyser() {
      let asset = document.getElementById("asset").value;
      let res = document.getElementById("resultat");
      res.innerText = "Analyse en cours...";
      res.style.color = "cyan";

      try {
        let response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${asset}&interval=1m&limit=20`);
        if (!response.ok) throw new Error("API non disponible");
        let data = await response.json();
        let prices = data.map(candle => parseFloat(candle[4]));
        let currentPrice = prices[prices.length-1];

        let rsi = calculRSI(prices);
        let ema = calculEMA(prices);
        let stoch = calculStoch(prices);
        let boll = calculBollinger(prices);
        let macdObj = calculMACD(prices);
        let atr = calculATR(data);

        // Tableau d'analyse
        document.getElementById("analyse").innerHTML = `
          <b>RSI:</b> ${rsi.toFixed(2)}<br>
          <b>EMA:</b> ${ema.toFixed(2)}<br>
          <b>Stochastic:</b> ${stoch.toFixed(2)}<br>
          <b>Bollinger Haut:</b> ${boll.upper.toFixed(2)} | <b>Bas:</b> ${boll.lower.toFixed(2)}<br>
          <b>MACD:</b> ${macdObj.macd.toFixed(2)} | <b>Signal:</b> ${macdObj.signal.toFixed(2)}<br>
          <b>ATR:</b> ${atr.toFixed(2)}
        `;

        // Vote souple
        let votesAcheter = 0, votesVendre = 0;
        if (rsi < 40) votesAcheter++; if (rsi > 60) votesVendre++;
        if (stoch < 30) votesAcheter++; if (stoch > 70) votesVendre++;
        if (currentPrice > ema) votesAcheter++; else votesVendre++;
        if (currentPrice < boll.lower) votesAcheter++; if (currentPrice > boll.upper) votesVendre++;
        if (macdObj.macd > macdObj.signal) votesAcheter++; else votesVendre++;

        let decision = "Attente";
        if (votesAcheter >= 2) decision = "Acheter";
        else if (votesVendre >= 2) decision = "Vendre";

        res.innerText = decision;
        res.style.color = decision === "Acheter" ? "lime" : decision === "Vendre" ? "red" : "yellow";

      } catch (err) {
        res.innerText = "Erreur: " + err.message;
        res.style.color = "orange";
      }
