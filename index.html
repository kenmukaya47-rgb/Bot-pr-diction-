<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Bot Rapide Trading</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; text-align: center; padding: 40px; }
    h2 { color: #ffcc00; }
    .bloc { background: #222; padding: 20px; border-radius: 10px; width: 300px; margin: auto; }
    button { padding: 10px 20px; background: #ffcc00; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #ffaa00; }
    #resultat { font-size: 24px; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>⚡ Bot Rapide - Analyse Express</h2>
  
  <div class="bloc">
    <label>Actif :</label><br>
    <input type="text" id="asset" value="BTCUSDT"><br><br>
    
    <label>Durée (secondes) :</label><br>
    <input type="number" id="duration" value="5"><br><br>
    
    <button onclick="analyser()">Analyser</button>
    <div id="resultat"></div>
  </div>

  <script>
    // RSI
    function calculRSI(prices, period = 5) {
      let gains = 0, losses = 0;
      for (let i = 1; i < period; i++) {
        let diff = prices[i] - prices[i-1];
        if (diff >= 0) gains += diff; else losses -= diff;
      }
      let avgGain = gains / period;
      let avgLoss = losses / period;
      let rs = avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }

    // EMA
    function calculEMA(prices, period = 5) {
      let k = 2 / (period + 1);
      let ema = prices[0];
      for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
      }
      return ema;
    }

    // Stochastic
    function calculStoch(prices, period = 5) {
      let slice = prices.slice(-period);
      let high = Math.max(...slice);
      let low = Math.min(...slice);
      let current = prices[prices.length-1];
      return ((current - low) / (high - low)) * 100;
    }

    // Bollinger
    function calculBollinger(prices, period = 5, mult = 2) {
      let slice = prices.slice(-period);
      let mean = slice.reduce((a,b) => a+b, 0) / period;
      let variance = slice.reduce((a,b) => a + Math.pow(b-mean,2), 0) / period;
      let stdDev = Math.sqrt(variance);
      return { upper: mean + mult*stdDev, lower: mean - mult*stdDev };
    }

    async function analyser() {
      let asset = document.getElementById("asset").value;
      let response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${asset}&interval=1m&limit=10`);
      let data = await response.json();
      let prices = data.map(candle => parseFloat(candle[4]));
      let currentPrice = prices[prices.length-1];

      let rsi = calculRSI(prices);
      let ema = calculEMA(prices);
      let stoch = calculStoch(prices);
      let boll = calculBollinger(prices);

      // Système de décision rapide
      let decision = "Attente";
      if (rsi < 30 && stoch < 20 && currentPrice > ema && currentPrice < boll.lower) {
        decision = "Acheter";
      } else if (rsi > 70 && stoch > 80 && currentPrice < ema && currentPrice > boll.upper) {
        decision = "Vendre";
      }

      // Affichage avec couleur
      let res = document.getElementById("resultat");
      res.innerText = decision;
      if (decision === "Acheter") res.style.color = "lime";
      else if (decision === "Vendre") res.style.color = "red";
      else res.style.color = "yellow";
    }
  </script>
</body>
</html>
